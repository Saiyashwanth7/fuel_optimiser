<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fuel Route Optimizer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #181c25;
        --border: #252a36;
        --accent: #f5a623;
        --accent-dim: #7a5010;
        --text: #e8eaf0;
        --muted: #6b7280;
        --green: #22c55e;
        --red: #ef4444;
        --card-r: 12px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
      }

      /* ── header ── */
      header {
        max-width: 680px;
        margin: 0 auto 2.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .logo-mark {
        width: 36px;
        height: 36px;
        background: var(--accent);
        border-radius: 8px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .logo-mark svg {
        width: 20px;
        height: 20px;
      }
      header h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      header p {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--card-r);
        padding: 1.5rem;
        max-width: 680px;
        margin: 0 auto 1.25rem;
      }

      /* ── form ── */
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      @media (max-width: 500px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.4rem;
      }
      input[type="text"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        padding: 0.65rem 0.85rem;
        outline: none;
        transition: border-color 0.15s;
      }
      input[type="text"]:focus {
        border-color: var(--accent);
      }
      input[type="text"]::placeholder {
        color: var(--muted);
      }

      /* ── button ── */
      button {
        width: 100%;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 8px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.75rem;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }
      button:hover:not(:disabled) {
        opacity: 0.9;
      }
      button:active:not(:disabled) {
        transform: scale(0.99);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── spinner ── */
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-top-color: #000;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── error ── */
      .error-box {
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 8px;
        color: var(--red);
        font-size: 0.875rem;
        padding: 0.75rem 1rem;
        display: none;
      }

      /* ── summary strip ── */
      .summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--border);
        border-radius: var(--card-r);
        overflow: hidden;
        max-width: 680px;
        margin: 0 auto 1.25rem;
        display: none;
      }
      .summary-item {
        background: var(--surface);
        padding: 1rem 1.25rem;
      }
      .summary-item .val {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 0.3rem;
      }
      .summary-item .lbl {
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ── stops list ── */
      .stops-header {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.75rem;
      }
      .stop {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        padding: 0.9rem 0;
        border-bottom: 1px solid var(--border);
      }
      .stop:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .stop-num {
        width: 26px;
        height: 26px;
        background: var(--accent-dim);
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
        margin-top: 2px;
      }
      .stop-body {
        flex: 1;
        min-width: 0;
      }
      .stop-name {
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .stop-loc {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .stop-meta {
        display: flex;
        gap: 1rem;
        margin-top: 0.5rem;
      }
      .stop-tag {
        font-size: 0.75rem;
        color: var(--muted);
      }
      .stop-tag span {
        color: var(--text);
        font-weight: 500;
      }
      .stop-cost {
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--green);
        flex-shrink: 0;
        margin-top: 2px;
      }

      /* ── no stops ── */
      .no-stops {
        text-align: center;
        padding: 1.5rem 0 0.5rem;
        color: var(--muted);
        font-size: 0.875rem;
      }
      .no-stops span {
        font-size: 1.5rem;
        display: block;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-mark">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="#000"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 17h1m16 0h1M5 17H4a1 1 0 01-1-1v-5l3-6h12l3 6v5a1 1 0 01-1 1h-1"
          />
          <circle cx="7.5" cy="17" r="2" />
          <circle cx="16.5" cy="17" r="2" />
          <path d="M7.5 15h9" />
        </svg>
      </div>
      <div>
        <h1>Fuel Route Optimizer</h1>
        <p>Cheapest fuel stops for US truck routes · 500 mi tank · 10 mpg</p>
      </div>
    </header>

    <!-- input card -->
    <div class="card">
      <div class="form-row">
        <div>
          <label>Start Location</label>
          <input type="text" id="start" placeholder="Chicago, IL" />
        </div>
        <div>
          <label>Finish Location</label>
          <input type="text" id="finish" placeholder="Dallas, TX" />
        </div>
      </div>
      <button id="btn" onclick="runOptimizer()">
        <div class="spinner" id="spinner"></div>
        <span id="btn-text">Find Cheapest Route</span>
      </button>
      <div class="error-box" id="error"></div>
    </div>

    <!-- summary strip -->
    <div class="summary" id="summary">
      <div class="summary-item">
        <div class="val" id="s-cost">—</div>
        <div class="lbl">Total Fuel Cost</div>
      </div>
      <div class="summary-item">
        <div class="val" id="s-dist">—</div>
        <div class="lbl">Distance (miles)</div>
      </div>
      <div class="summary-item">
        <div class="val" id="s-stops">—</div>
        <div class="lbl">Fuel Stops</div>
      </div>
    </div>

    <!-- stops card -->
    <div class="card" id="stops-card" style="display: none">
      <div class="stops-header" id="stops-header">Fuel Stops</div>
      <div id="stops-list"></div>
    </div>

    <script>
      const API = "";

      async function runOptimizer() {
        const start = document.getElementById("start").value.trim();
        const finish = document.getElementById("finish").value.trim();
        const btn = document.getElementById("btn");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btn-text");
        const errorBox = document.getElementById("error");

        // reset
        errorBox.style.display = "none";
        document.getElementById("summary").style.display = "none";
        document.getElementById("stops-card").style.display = "none";

        if (!start || !finish) {
          showError("Please enter both a start and finish location.");
          return;
        }

        // loading state
        btn.disabled = true;
        spinner.style.display = "block";
        btnText.textContent = "Optimizing route…";

        try {
          const url = `${API}/api/?start=${encodeURIComponent(start)}&finish=${encodeURIComponent(finish)}`;
          const res = await fetch(url);
          const data = await res.json();

          if (!res.ok || data.error) {
            showError(data.error || "Something went wrong. Please try again.");
            return;
          }

          renderResult(data);
        } catch (e) {
          showError(
            "Could not reach the API. Please check your connection and try again.",
          );
        } finally {
          btn.disabled = false;
          spinner.style.display = "none";
          btnText.textContent = "Find Cheapest Route";
        }
      }

      function renderResult(data) {
        // summary
        document.getElementById("s-cost").textContent =
          "$" + data.total_fuel_cost_usd.toFixed(2);
        document.getElementById("s-dist").textContent =
          data.total_distance_miles.toFixed(1);
        document.getElementById("s-stops").textContent = data.fuel_stop_count;
        document.getElementById("summary").style.display = "grid";

        // stops
        const list = document.getElementById("stops-list");
        const card = document.getElementById("stops-card");
        const header = document.getElementById("stops-header");
        list.innerHTML = "";

        if (!data.fuel_stops || data.fuel_stops.length === 0) {
          header.textContent = "No Fuel Stops Needed";
          list.innerHTML = `<div class="no-stops"><span>✓</span>This trip fits within a single 500-mile tank. No stops required.</div>`;
        } else {
          header.textContent = `Fuel Stops · ${data.fuel_stops.length} stop${data.fuel_stops.length > 1 ? "s" : ""}`;
          data.fuel_stops.forEach((stop, i) => {
            const div = document.createElement("div");
            div.className = "stop";
            div.innerHTML = `
            <div class="stop-num">${i + 1}</div>
            <div class="stop-body">
              <div class="stop-name">${stop.name}</div>
              <div class="stop-loc">${stop.city}, ${stop.state} · mile ${Math.round(stop.dist_from_start)}</div>
              <div class="stop-meta">
                <div class="stop-tag">Price <span>$${stop.avg_price.toFixed(3)}/gal</span></div>
                <div class="stop-tag">Gallons <span>${stop.gallons_needed}</span></div>
                <div class="stop-tag">Leg <span>${stop.leg_miles} mi</span></div>
              </div>
            </div>
            <div class="stop-cost">$${stop.leg_cost_usd.toFixed(2)}</div>
          `;
            list.appendChild(div);
          });
        }

        card.style.display = "block";
      }

      function showError(msg) {
        const box = document.getElementById("error");
        box.textContent = msg;
        box.style.display = "block";
      }

      // allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") runOptimizer();
      });
    </script>
  </body>
</html>
